<svg xmlns="http://www.w3.org/2000/svg" viewBox="75 55 350 350" width="100%" height="100%">
  <defs>
    <!-- Define global styles for consistent stroke rendering -->
    <style>
      .icon-stroke {
        fill: none;
        stroke: #1865e6;
        stroke-width: 28;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- Background (Optional/Transparent) -->
  <rect width="100%" height="100%" fill="none" />

  <!-- Main Group with a slight rotation to match the original sketch dynamics -->
  <g transform="translate(10, 0)">
    
    <!-- Top-Left Arc of the Circle -->
    <path d="M 255 110 
             A 140 140 0 0 0 115 295" 
          class="icon-stroke" />

    <!-- Bottom-Right Arc of the Circle -->
    <path d="M 375 185 
             A 140 140 0 0 1 255 365" 
          class="icon-stroke" />

    <!-- The Pencil / Stylus (Rotated ~53 degrees) -->
    <g transform="translate(245, 235) rotate(-53) translate(-245, -235)">
      <!-- Pencil Body & Tip -->
      <!-- Main rectangular body with a pointed tip on the left -->
      <path d="M 135 235 
               L 165 205 
               L 355 205 
               A 10 10 0 0 1 365 215
               L 365 255 
               A 10 10 0 0 1 355 265
               L 165 265 
               Z" 
            class="icon-stroke" />
            
      <!-- Eraser/Cap Detail Line -->
      <path d="M 325 205 L 325 265" class="icon-stroke" />
    </g>
    
  </g>
</svg>
